name: Deploy Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Copy build to Lightsail
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ubuntu
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          source: 'dist/*,package.json,package-lock.json,prisma/schema.prisma,prisma.config.ts'
          target: '/opt/prophives-backend'
          strip_components: 0

      - name: Install production deps & restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ubuntu
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          script: |
            cd /opt/prophives-backend
            npm ci --omit=dev
            npx prisma generate
            pm2 restart prophives-backend --update-env 2>/dev/null || pm2 start /opt/prophives-backend/start.sh --name prophives-backend
            pm2 save
